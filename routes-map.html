const map = L.map('map',{zoomControl:false});
L.control.zoom({position:'topleft'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
 {attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:20}).addTo(map);

const layers={}; const allBounds=[];
ROUTES.forEach(r=>{
  const grp=L.layerGroup();
  const latlngs=r.stops.map(s=>[s.lat,s.lon]);
  r.stops.forEach(s=>allBounds.push([s.lat,s.lon]));
  if(latlngs.length>1){
    const loop=latlngs.concat([latlngs[0]]);
    L.polyline(loop,{color:r.color,weight:3,opacity:.85}).addTo(grp);
  }
  r.stops.forEach(s=>{
    const icon=L.divIcon({className:'',html:'<div class="marker-pin" style="background:'+r.color+'">'+s.letter+'</div>',
      iconSize:[22,22],iconAnchor:[11,11]});
    const shops=s.names.map(n=>'• '+n).join('<br>');
    L.marker([s.lat,s.lon],{icon:icon}).addTo(grp)
      .bindPopup('<b>'+s.letter+' — '+(s.names.length>1?s.names.length+' shops':s.names[0])+'</b><br>'
        +shops+'<br><span style="color:#888">'+s.addr+'</span><br>'
        +'<b style="color:'+r.color+'">Route '+r.label+' · '+r.name+'</b>');
  });
  layers[r.label]=grp; grp.addTo(map);
});

function fitAll(){ if(allBounds.length) map.fitBounds(allBounds,{padding:[40,40]}); }
fitAll();
L.control.zoom && (function(){
  const FitCtl=L.Control.extend({options:{position:'topleft'},
    onAdd:function(){const d=L.DomUtil.create('div','leaflet-bar');
      const a=L.DomUtil.create('a','',d);a.href='#';a.title='Fit all routes';a.innerHTML='⤢';
      a.style.fontSize='16px';a.style.fontWeight='bold';
      L.DomEvent.on(a,'click',function(e){L.DomEvent.preventDefault(e);fitAll();});return d;}});
  map.addControl(new FitCtl());
})();

const list=document.getElementById('legendList');
ROUTES.forEach(r=>{
  const li=document.createElement('li');
  li.innerHTML='<input type="checkbox" checked data-r="'+r.label+'">'
    +'<span class="sw" style="background:'+r.color+'"></span>'
    +'<span class="lbl"><b>'+r.label+'</b> '+r.name+'<br><span class="who">'+r.assignee+'</span></span>';
  list.appendChild(li);
  const cb=li.querySelector('input');
  function toggle(on){ if(on){layers[r.label].addTo(map);}else{map.removeLayer(layers[r.label]);} }
  cb.addEventListener('change',()=>toggle(cb.checked));
  li.addEventListener('click',e=>{ if(e.target!==cb){cb.checked=!cb.checked;toggle(cb.checked);} });
});
document.getElementById('selAll').onclick=()=>{document.querySelectorAll('#legendList input').forEach(cb=>{if(!cb.checked){cb.checked=true;layers[cb.dataset.r].addTo(map);}});};
document.getElementById('deselAll').onclick=()=>{document.querySelectorAll('#legendList input').forEach(cb=>{if(cb.checked){cb.checked=false;map.removeLayer(layers[cb.dataset.r]);}});};
</script></body></html>
