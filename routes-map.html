    });
  });

  map.fitBounds(allBounds, { padding: [40, 40] });

  // Build legend
  var legendEl = document.getElementById('legend-items');
  routeData.forEach(function(route) {
    var item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML =
      '<div class="legend-check" id="check-' + route.num + '">✓</div>' +
      '<div class="legend-swatch" style="background:' + route.color + '"></div>' +
      '<div class="legend-label">' +
        route.num + ' · ' + route.name +
        '<small>' + route.person + ' · ' + route.distance + ' km</small>' +
      '</div>';

    item.addEventListener('click', function() {
      var state = routeLayers[route.num];
      if (state.visible) {
        map.removeLayer(state.group);
        state.visible = false;
        item.classList.add('hidden');
        document.getElementById('check-' + route.num).textContent = '';
      } else {
        map.addLayer(state.group);
        state.visible = true;
        item.classList.remove('hidden');
        document.getElementById('check-' + route.num).textContent = '✓';
      }
    });

    legendEl.appendChild(item);
  });

  // Controls
  window._zoomIn = function() { map.zoomIn(); };
  window._zoomOut = function() { map.zoomOut(); };
  window._fitAll = function() { map.fitBounds(allBounds, { padding: [40, 40] }); };
});
</script>

<style>
  .seq-label {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    color: #fff;
    font-weight: 700;
    font-size: 11px;
    text-align: center;
  }
  .seq-label::before {
    display: none;
  }
</style>

</body>
</html>
