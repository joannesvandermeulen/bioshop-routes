      `${shopHtml}` +
      `<div class="pop-addr">${escapeHtml(s.address)}</div>` +
      `<span class="pop-route">Route ${r.route} · ${escapeHtml(r.name)}${r.person ? ' · ' + escapeHtml(r.person) : ''}</span>`
    );
    m.addTo(group);
    allBounds.extend([s.lat, s.lon]);
  });
  layerGroups[r.route] = group;
  group.addTo(map);
});

// Build legend
const legend = document.getElementById('legend');
ROUTES.forEach(r => {
  const li = document.createElement('li');
  li.innerHTML = `
    <input type="checkbox" checked data-route="${r.route}">
    <span class="swatch" style="background:${r.colour}"></span>
    <span class="num">${r.route}</span>
    <span class="info">
      <span class="lname">${escapeHtml(r.name)}</span>
      <span class="lperson">${escapeHtml(r.person || '—')} · ${r.stops.length} stops · ${r.distance_km.toFixed(1)} km</span>
    </span>
  `;
  legend.appendChild(li);
  const cb = li.querySelector('input');
  cb.addEventListener('change', e => {
    e.stopPropagation();
    toggleRoute(r.route, cb.checked);
  });
  li.addEventListener('click', e => {
    if (e.target.tagName === 'INPUT') return;
    cb.checked = !cb.checked;
    toggleRoute(r.route, cb.checked);
  });
});

function toggleRoute(rt, on) {
  const g = layerGroups[rt];
  if (!g) return;
  if (on) {
    g.addTo(map);
  } else {
    map.removeLayer(g);
  }
}

function zoomIn()  { map.zoomIn(); }
function zoomOut() { map.zoomOut(); }
function fitAll()  { map.fitBounds(allBounds, { padding: [30, 30] }); }

function selectAll(on) {
  document.querySelectorAll('#legend input[type=checkbox]').forEach(cb => {
    cb.checked = on;
    toggleRoute(cb.dataset.route, on);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// Initial fit
if (allBounds.isValid()) {
  map.fitBounds(allBounds, { padding: [30, 30] });
}
</script>
</body>
</html>
